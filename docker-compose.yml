services:
  db:
    image: postgres:18

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

  web:
    build: .

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

volumes:
  postgres_data:
